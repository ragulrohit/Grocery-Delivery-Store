<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Grocery Delivery Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="preloader" class="loading-overlay">
        <div class="spinner"></div>
        <p>Welcome back...</p>
    </div>

    <div class="auth-page">
        <div class="auth-shell animate-scaleIn">
            <div class="auth-visual">
                <img src="images/product-bakery-combo.png" alt="Fresh bread and bakery favorites ready for an easy weekly shop">
                <div class="auth-visual-copy"><h1>Your weekly shop, made wonderfully simple.</h1><p>Fresh picks, careful packing and convenient delivery windows&mdash;all in one place.</p></div>
            </div>
        <div class="auth-container">
            <div class="auth-header">
                <img src="images/stackly-logo.webp" alt="Stackly">
                <h2>Welcome Back!</h2>
                <p>Login to your grocery account</p>
            </div>
            <form class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login &#10140;</button>
                <div class="divider"><span>or</span></div>
                <div class="social-login">
                    <button type="button" class="btn btn-outline" style="flex:1;justify-content:center;" onclick="showToast('Google login coming soon!')">&#9679; Google</button>
                    <button type="button" class="btn btn-outline" style="flex:1;justify-content:center;" onclick="showToast('Facebook login coming soon!')">&#9679; Facebook</button>
                </div>
                <div class="form-footer">
                    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
                    <p style="margin-top:0.5rem;"><a href="index.html" style="color:var(--gray);font-weight:400;font-size:0.85rem;">&#8592; Back to Home</a></p>
                </div>
                <div class="auth-trust"><span>&#10003; Freshness guarantee</span><span>&#10003; Secure checkout</span><span>&#10003; Easy support</span></div>
            </form>
        </div>
        </div>
    </div>

    <footer class="footer auth-footer" data-site-footer></footer>

    <script src="script.js"></script>
</body>
</html>
